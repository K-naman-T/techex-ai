# Gemini Live — Realistic Concurrency Test
# Each user: connects → starts session → sends 6 audio chunks (simulating ~3s of speech)
# → waits for AI response → sends 4 more chunks → disconnects
# Audio: 640 bytes of PCM silence (20ms @ 16kHz 16-bit mono)

config:
  target: "ws://localhost:3005/api/ws"
  phases:
    # Phase 1: 10 users arrive over 5 seconds (all overlap)
    - name: "10 simultaneous users"
      duration: 5
      arrivalCount: 10

    # Cooldown — let sessions finish before next wave
    - name: "Cooldown"
      duration: 25
      arrivalCount: 0

    # Phase 2: 15 users arrive over 5 seconds
    - name: "15 simultaneous users"
      duration: 5
      arrivalCount: 15

    # Cooldown
    - name: "Cooldown"
      duration: 25
      arrivalCount: 0

    # Phase 3: 20 users arrive over 5 seconds
    - name: "20 simultaneous users"
      duration: 5
      arrivalCount: 20

  engines:
    ws: {}

scenarios:
  - name: "Realistic Gemini Live Conversation"
    engine: ws
    flow:
      # 1. Start Gemini Live session
      - send: '{"type": "start_gemini_live", "language": "en"}'

      # 2. Wait for session to establish
      - think: 2

      # 3. User speaks — send 6 audio chunks rapidly (simulating ~120ms of speech)
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'

      # 4. Wait for AI to process and respond (~3-5 seconds)
      - think: 5

      # 5. User speaks again — second turn (4 more chunks)
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'
      - think: 0.2
      - send: '{"type": "gemini_audio_in", "data": ""}'

      # 6. Wait for second response
      - think: 5

      # 7. Clean disconnect
      - send: '{"type": "stop_gemini_live"}'
